<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>ERP - Clientes</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <div class="sidebar">
        <h2>ERP</h2>
        <ul>
            <li><a href="index.html">🏠 Dashboard</a></li>
            <li><a href="clientes.html">👥 Clientes</a></li>
            <li><a href="cidades.html">🌆 Cidades</a></li>
            <li><a href="ufs.html">🗺️ UF</a></li>
        </ul>
    </div>

    <div class="container">
        <h2 class="section-title">Cadastro de Cliente</h2>
        <form id="formCliente">
            <label for="nomeCliente">Nome</label>
            <input type="text" id="nomeCliente" name="nome" required />

            <label for="cpfCliente">CPF</label>
            <input type="text" id="cpfCliente" name="cpf" required />

            <label for="emailCliente">Email</label>
            <input type="email" id="emailCliente" name="email" required />

            <button type="submit">Cadastrar Cliente</button>
        </form>

        <h2 class="section-title">Clientes Cadastrados</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Email</th>
                    <th style="text-align: center;">Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaClientes"></tbody>
        </table>
    </div>

    <script src="/js/clientes.js"></script>
</body>
</html>
